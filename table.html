<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>table and list </title>
</head>
<body>
    <ul> 
        <li> first item</li>
        <li> second item</li>
        <li> third item</li>
    </ul>
    <ol> 
        <li> panipuri</li>
        <li> bhel</li>
        <li> shevpuri</li>
    </ol>
    <h1> table</h1>
    <table>
        <thead>
            <tr>
                <th> name</th>
                <th> age</th>
                <th> city</th>

            </tr>
        </thead>
        <tbody>
            <tr>
                <td> raju</td>
                <td> 20</td>
                <td> pune</td>
            </tr>
            <tr>
                <td> rani</td>
                <td> 22</td>
                <td> mumbai</td>
            </tr>
            <tr>
                <td> ramu</td>
                <td> 25</td>
                <td> delhi</td>
            </tr>

        </tbody>
    </table>
</body>
</html>
